name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK packages
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platforms;android-33" "build-tools;33.0.0"

      - name: Build Cordova Android project
        run: |
          cd build
          npx -y cordova@12 create app com.travelmate.app TravelMate
          cp config.xml app/config.xml
          cp www/index.html app/www/index.html
          cd app
          npx -y cordova@12 platform add android@12.0.0
          npx -y cordova@12 build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travelmate-apk
          path: build/app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
